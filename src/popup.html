<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=340">
    <title>AI Chat TOC Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">
        <!-- Header -->
        <header class="popup-header">
            <div class="header-left">
                <div class="header-icon">
                    <img src="icons/icon48.png" alt="AI Chat TOC" width="28" height="28">
                </div>
                <div class="header-text">
                    <h1>AI Chat TOC</h1>
                    <span class="header-version"></span>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tab-bar">
            <div class="tab-indicator"></div>
            <button class="tab active" data-tab="appearance">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
                Appearance
            </button>
            <button class="tab" data-tab="settings">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
                Settings
            </button>
        </nav>

        <!-- Content -->
        <main class="popup-body">
            <!-- Appearance Tab -->
            <section id="appearance" class="panel active">
                <div class="section-group">
                    <label class="section-label">Theme Mode</label>
                    <div class="mode-switcher">
                        <button class="mode-option" data-mode="light">
                            <span class="mode-icon">☀️</span>
                            <span class="mode-text">Light</span>
                        </button>
                        <button class="mode-option" data-mode="system">
                            <span class="mode-icon">🖥️</span>
                            <span class="mode-text">System</span>
                        </button>
                        <button class="mode-option" data-mode="dark">
                            <span class="mode-icon">🌙</span>
                            <span class="mode-text">Dark</span>
                        </button>
                    </div>
                </div>

                <div class="section-group">
                    <label class="section-label">Platform Themes</label>
                    <div id="platform-list"></div>
                </div>

                <div class="reset-area">
                    <button id="reset-defaults" class="reset-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10" />
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
                        </svg>
                        Reset to Defaults
                    </button>
                </div>
            </section>

            <!-- Settings Tab -->
            <section id="settings" class="panel">
                <div class="settings-group">
                    <div class="setting-card">
                        <div class="setting-info">
                            <span class="setting-label">Show answers in TOC</span>
                            <span class="setting-desc">Display AI response previews &amp; enable deep search</span>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-show-answers">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>

                </div>
            </section>
        </main>
    </div>
    <script src="themes.js"></script>
    <script src="popup.js"></script>
</body>

</html>
